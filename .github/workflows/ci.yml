name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: direct_democracy
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d direct_democracy"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/direct_democracy
      JWT_SECRET: test-secret
      REFRESH_TOKEN_SECRET: test-refresh-secret
      REDIS_ENABLED: 'false'
      NODE_ENV: test

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npm run generate --workspace=apps/backend

      - name: Push database schema
        run: npx prisma db push --schema=apps/backend/prisma/schema.prisma

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

  test-frontend:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies (incl. test runner)
        run: npm ci

      - name: Frontend unit tests (Karma + ChromeHeadlessCI)
        # CHROME_BIN points at the pre-installed Chromium on ubuntu-latest runners.
        run: CHROME_BIN=$(which chromium-browser || which chromium || which google-chrome) npm test --workspace=apps/frontend -- --watch=false --browsers=ChromeHeadlessCI
